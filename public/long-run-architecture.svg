<svg width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F766E"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #475569; }
      .layer { font: 700 20px Inter, Arial, sans-serif; fill: #0F172A; }
      .box-title { font: 700 16px Inter, Arial, sans-serif; fill: #0F172A; }
      .box-body { font: 500 13px Inter, Arial, sans-serif; fill: #334155; }
      .small { font: 600 14px Inter, Arial, sans-serif; fill: #0F172A; }
      .line { stroke: #0F766E; stroke-width: 3; marker-end: url(#arrow); }
      .dash { stroke: #14B8A6; stroke-width: 2.5; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="url(#bg)" rx="28"/>
  <text x="70" y="70" class="title">SurgiFind Long-Run Production Architecture</text>
  <text x="70" y="104" class="subtitle">Current Next.js + Supabase application extended with scale, security, observability, and payment infrastructure</text>

  <rect x="70" y="140" width="1460" height="120" rx="24" fill="#FFFFFF" stroke="#CFFAFE" stroke-width="2"/>
  <text x="100" y="178" class="layer">Users and Access</text>
  <rect x="100" y="198" width="220" height="42" rx="16" fill="#E2E8F0"/>
  <text x="145" y="225" class="small">Patients / Caregivers</text>
  <rect x="350" y="198" width="220" height="42" rx="16" fill="#E2E8F0"/>
  <text x="405" y="225" class="small">Operations / Admins</text>

  <rect x="70" y="290" width="1460" height="145" rx="24" fill="#F0FDFA" stroke="#99F6E4" stroke-width="2"/>
  <text x="100" y="328" class="layer">Edge and Traffic Layer</text>
  <g>
    <rect x="100" y="350" width="180" height="62" rx="18" fill="#FFFFFF" stroke="#99F6E4"/>
    <text x="170" y="376" text-anchor="middle" class="box-title">DNS</text>
    <text x="170" y="395" text-anchor="middle" class="box-body">Route users to app</text>

    <rect x="315" y="350" width="220" height="62" rx="18" fill="#FFFFFF" stroke="#99F6E4"/>
    <text x="425" y="376" text-anchor="middle" class="box-title">CDN / Edge Cache</text>
    <text x="425" y="395" text-anchor="middle" class="box-body">Assets and cacheable content</text>

    <rect x="570" y="350" width="220" height="62" rx="18" fill="#FFFFFF" stroke="#99F6E4"/>
    <text x="680" y="376" text-anchor="middle" class="box-title">WAF / Bot Protection</text>
    <text x="680" y="395" text-anchor="middle" class="box-body">Abuse filtering</text>

    <rect x="825" y="350" width="220" height="62" rx="18" fill="#FFFFFF" stroke="#99F6E4"/>
    <text x="935" y="376" text-anchor="middle" class="box-title">Global Load Balancer</text>
    <text x="935" y="395" text-anchor="middle" class="box-body">Traffic distribution</text>

    <rect x="1080" y="350" width="240" height="62" rx="18" fill="#FFFFFF" stroke="#99F6E4"/>
    <text x="1200" y="376" text-anchor="middle" class="box-title">API Management</text>
    <text x="1200" y="395" text-anchor="middle" class="box-body">Rate limit, versions, policies</text>
  </g>

  <rect x="70" y="465" width="700" height="210" rx="24" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="100" y="503" class="layer">Application Layer</text>
  <rect x="100" y="525" width="280" height="120" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="240" y="556" text-anchor="middle" class="box-title">Next.js Web Application</text>
  <text x="240" y="580" text-anchor="middle" class="box-body">App Router UI</text>
  <text x="240" y="600" text-anchor="middle" class="box-body">SSR and client interactions</text>
  <text x="240" y="620" text-anchor="middle" class="box-body">Deployed on Vercel or containers</text>

  <rect x="410" y="525" width="320" height="120" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="570" y="556" text-anchor="middle" class="box-title">Backend-for-Frontend APIs</text>
  <text x="570" y="580" text-anchor="middle" class="box-body">Search, chat, booking, payments</text>
  <text x="570" y="600" text-anchor="middle" class="box-body">Validation and orchestration</text>
  <text x="570" y="620" text-anchor="middle" class="box-body">Session-aware server actions</text>

  <rect x="800" y="465" width="730" height="210" rx="24" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="2"/>
  <text x="830" y="503" class="layer">Platform and Operations Layer</text>
  <rect x="830" y="525" width="200" height="120" rx="18" fill="#F0FDF4" stroke="#A7F3D0"/>
  <text x="930" y="556" text-anchor="middle" class="box-title">Redis Cache</text>
  <text x="930" y="580" text-anchor="middle" class="box-body">Search caching</text>
  <text x="930" y="600" text-anchor="middle" class="box-body">Rate limit counters</text>
  <text x="930" y="620" text-anchor="middle" class="box-body">Session-adjacent fast reads</text>

  <rect x="1060" y="525" width="210" height="120" rx="18" fill="#F0FDF4" stroke="#A7F3D0"/>
  <text x="1165" y="556" text-anchor="middle" class="box-title">Queue + Workers</text>
  <text x="1165" y="580" text-anchor="middle" class="box-body">Notifications</text>
  <text x="1165" y="600" text-anchor="middle" class="box-body">Retries and reconciliation</text>
  <text x="1165" y="620" text-anchor="middle" class="box-body">Reporting jobs</text>

  <rect x="1300" y="525" width="200" height="120" rx="18" fill="#F0FDF4" stroke="#A7F3D0"/>
  <text x="1400" y="556" text-anchor="middle" class="box-title">Observability</text>
  <text x="1400" y="580" text-anchor="middle" class="box-body">Logs, metrics, traces</text>
  <text x="1400" y="600" text-anchor="middle" class="box-body">Dashboards and alerts</text>
  <text x="1400" y="620" text-anchor="middle" class="box-body">Operational insight</text>

  <rect x="70" y="710" width="710" height="250" rx="24" fill="#FFFFFF" stroke="#FDE68A" stroke-width="2"/>
  <text x="100" y="748" class="layer">Data and Security Layer</text>
  <rect x="100" y="770" width="200" height="150" rx="18" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="200" y="801" text-anchor="middle" class="box-title">Supabase Auth</text>
  <text x="200" y="825" text-anchor="middle" class="box-body">Identity and sessions</text>
  <text x="200" y="845" text-anchor="middle" class="box-body">Protected routes</text>

  <rect x="325" y="770" width="210" height="150" rx="18" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="430" y="801" text-anchor="middle" class="box-title">Postgres / Supabase</text>
  <text x="430" y="825" text-anchor="middle" class="box-body">Hospitals, slots, bookings</text>
  <text x="430" y="845" text-anchor="middle" class="box-body">Insurance and catalog data</text>
  <text x="430" y="865" text-anchor="middle" class="box-body">Transactional source of truth</text>

  <rect x="560" y="770" width="190" height="150" rx="18" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="655" y="801" text-anchor="middle" class="box-title">Secrets + Audit</text>
  <text x="655" y="825" text-anchor="middle" class="box-body">Managed secrets</text>
  <text x="655" y="845" text-anchor="middle" class="box-body">Key rotation</text>
  <text x="655" y="865" text-anchor="middle" class="box-body">Audit event trail</text>

  <rect x="810" y="710" width="720" height="250" rx="24" fill="#FFFFFF" stroke="#E9D5FF" stroke-width="2"/>
  <text x="840" y="748" class="layer">External Integrations</text>
  <rect x="840" y="770" width="180" height="150" rx="18" fill="#FAF5FF" stroke="#E9D5FF"/>
  <text x="930" y="801" text-anchor="middle" class="box-title">OpenAI</text>
  <text x="930" y="825" text-anchor="middle" class="box-body">Assistant responses</text>
  <text x="930" y="845" text-anchor="middle" class="box-body">Intent interpretation</text>

  <rect x="1050" y="770" width="190" height="150" rx="18" fill="#FAF5FF" stroke="#E9D5FF"/>
  <text x="1145" y="801" text-anchor="middle" class="box-title">Payment Gateway</text>
  <text x="1145" y="825" text-anchor="middle" class="box-body">Deposits and refunds</text>
  <text x="1145" y="845" text-anchor="middle" class="box-body">Receipts and webhooks</text>

  <rect x="1270" y="770" width="230" height="150" rx="18" fill="#FAF5FF" stroke="#E9D5FF"/>
  <text x="1385" y="801" text-anchor="middle" class="box-title">Notifications + Partners</text>
  <text x="1385" y="825" text-anchor="middle" class="box-body">Email, SMS, WhatsApp</text>
  <text x="1385" y="845" text-anchor="middle" class="box-body">Hospitals and insurers</text>
  <text x="1385" y="865" text-anchor="middle" class="box-body">Future integrations</text>

  <line x1="280" y1="381" x2="315" y2="381" class="line"/>
  <line x1="535" y1="381" x2="570" y2="381" class="line"/>
  <line x1="790" y1="381" x2="825" y2="381" class="line"/>
  <line x1="1045" y1="381" x2="1080" y2="381" class="line"/>

  <line x1="1180" y1="412" x2="1180" y2="465" class="line"/>
  <line x1="935" y1="412" x2="240" y2="525" class="dash"/>
  <line x1="1200" y1="412" x2="570" y2="525" class="dash"/>

  <line x1="570" y1="645" x2="430" y2="770" class="line"/>
  <line x1="570" y1="645" x2="930" y2="770" class="line"/>
  <line x1="930" y1="645" x2="930" y2="710" class="line"/>
  <line x1="1165" y1="645" x2="1165" y2="710" class="line"/>
  <line x1="1400" y1="645" x2="1400" y2="710" class="line"/>

  <line x1="240" y1="240" x2="240" y2="290" class="line"/>
  <line x1="460" y1="240" x2="460" y2="290" class="line"/>

  <rect x="70" y="985" width="1460" height="55" rx="18" fill="#0F172A"/>
  <text x="100" y="1019" style="font: 600 16px Inter, Arial, sans-serif; fill: #E2E8F0;">Current app stays at the core. Scale comes from edge controls, autoscaling runtime, cache, API governance, monitoring, and payment integration.</text>
</svg>
